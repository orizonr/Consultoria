<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="shortcut icon" href="../imagens/icone.png" type="image/png"/>
<title>Contrato Assinado — Orizon Consultoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap"/>
<link rel="stylesheet" href="assets/cr-typo-fix.css"/>
<style>
/* ── Tokens ── */
:root {
  --accent:#60a5fa; --primary:#1e40af; --bg:#060606; --card:#0e0e0e; --card2:#131313;
  --border:rgba(96,165,250,.10); --border2:rgba(96,165,250,.28);
  --text:#efefef; --muted:#5a5a5a; --muted2:#2e2e2e;
  --green:#2ecc71; --orange:#f39c12; --red:#e74c3c; --purple:#a78bfa;
  --font:'Sora',sans-serif; --mono:'DM Mono',monospace; --radius:14px;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:15px;
  -webkit-font-smoothing:antialiased; min-height:100vh; }

/* ── Toolbar ── */
.toolbar {
  position:sticky; top:0; z-index:100;
  background:rgba(6,6,6,.97); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:.6rem 1.4rem;
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
}
.tb-info { display:flex; align-items:center; gap:.65rem; }
.tb-logo {
  width:30px; height:30px; border-radius:8px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0;
}
.tb-logo img { width:22px; height:22px; object-fit:contain; }
.tb-title { font-size:.8rem; font-weight:800; }
.tb-title em { color:var(--purple); font-style:normal; }
.tb-num { font-size:.62rem; color:var(--muted); font-family:var(--mono); }
.tb-actions { display:flex; gap:.4rem; align-items:center; }

/* ── Botões ── */
.btn {
  display:inline-flex; align-items:center; gap:.35rem;
  padding:.4rem .85rem; border-radius:8px; border:1px solid transparent;
  cursor:pointer; font-family:var(--font); font-size:.72rem; font-weight:700;
  transition:all .14s; text-decoration:none; white-space:nowrap;
}
.btn-primary { background:linear-gradient(135deg,var(--primary),var(--accent)); color:#fff; }
.btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
.btn-ghost { background:rgba(255,255,255,.05); color:var(--muted); border-color:rgba(255,255,255,.09); }
.btn-ghost:hover { background:rgba(255,255,255,.1); color:var(--text); }
.btn-green { background:rgba(46,204,113,.12); color:var(--green); border-color:rgba(46,204,113,.25); }
.btn-green:hover { background:rgba(46,204,113,.22); }
.btn-sm { padding:.3rem .65rem; font-size:.68rem; }

/* ── Área de conteúdo ── */
.page-wrap {
  display:grid;
  grid-template-columns: 340px 1fr;
  gap:1.2rem;
  padding:1.4rem;
  max-width:1400px;
  margin:0 auto;
}

/* ── PAINEL LATERAL DE STATUS ── */
.status-panel {
  display:flex; flex-direction:column; gap:.8rem;
}

.status-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden;
}
.sc-head {
  padding:.75rem 1rem;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:.5rem;
}
.sc-head-title { font-size:.78rem; font-weight:800; }
.sc-body { padding:.85rem 1rem; }

/* Badge status contrato */
.contrato-status-badge {
  display:flex; align-items:center; gap:.55rem;
  padding:.65rem .9rem; border-radius:9px;
  font-size:.78rem; font-weight:800; margin-bottom:.75rem;
}
.contrato-status-badge.assinado { background:rgba(46,204,113,.08); border:1px solid rgba(46,204,113,.2); color:var(--green); }
.contrato-status-badge.parcial  { background:rgba(96,165,250,.07); border:1px solid rgba(96,165,250,.2); color:var(--accent); }
.contrato-status-badge.enviado  { background:rgba(243,156,18,.07); border:1px solid rgba(243,156,18,.18); color:var(--orange); }
.contrato-status-badge.cancelado{ background:rgba(231,76,60,.07); border:1px solid rgba(231,76,60,.18); color:var(--red); }

/* Metadados do contrato */
.meta-row {
  display:flex; justify-content:space-between; align-items:flex-start;
  font-size:.72rem; padding:.32rem 0;
  border-bottom:1px solid var(--border);
}
.meta-row:last-child { border-bottom:none; }
.meta-lbl { color:var(--muted); }
.meta-val { font-weight:700; text-align:right; max-width:55%; word-break:break-word; }
.meta-val.mono { font-family:var(--mono); font-size:.68rem; color:var(--accent); }

/* Signatários */
.sig-item {
  display:flex; align-items:center; gap:.6rem;
  padding:.55rem 0;
  border-bottom:1px solid var(--border);
}
.sig-item:last-child { border-bottom:none; }
.sig-dot-lg {
  width:30px; height:30px; border-radius:50%; border:2px solid;
  display:flex; align-items:center; justify-content:center;
  font-size:.75rem; flex-shrink:0;
}
.sig-dot-lg.ok     { background:rgba(46,204,113,.12); border-color:var(--green); color:var(--green); }
.sig-dot-lg.pend   { background:rgba(243,156,18,.08); border-color:var(--orange); color:var(--orange); }
.sig-dot-lg.rec    { background:rgba(231,76,60,.08); border-color:var(--red); color:var(--red); }
.sig-nome { font-size:.76rem; font-weight:700; line-height:1.2; }
.sig-papel { font-size:.62rem; color:var(--muted); }
.sig-data { font-size:.6rem; color:var(--green); margin-top:.08rem; }

/* Trilha de auditoria */
.audit-item {
  display:flex; gap:.55rem; align-items:flex-start;
  padding:.45rem 0; border-bottom:1px solid var(--border);
  font-size:.7rem;
}
.audit-item:last-child { border-bottom:none; }
.audit-dot {
  width:8px; height:8px; border-radius:50%;
  margin-top:.28rem; flex-shrink:0;
}
.audit-dot.ok   { background:var(--green); }
.audit-dot.evt  { background:var(--accent); }
.audit-dot.warn { background:var(--orange); }
.audit-dot.err  { background:var(--red); }
.audit-msg { flex:1; line-height:1.55; }
.audit-msg strong { font-weight:700; color:var(--text); }
.audit-ts { color:var(--muted); font-size:.6rem; font-family:var(--mono); white-space:nowrap; }

/* ── ÁREA DO DOCUMENTO ── */
.doc-col {
  min-width:0;
}
.doc-wrapper {
  background:var(--card2); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden;
}
.doc-header-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:.65rem 1rem; border-bottom:1px solid var(--border);
  font-size:.72rem; font-weight:700; gap:.5rem;
}
.doc-header-bar span { color:var(--muted); font-weight:400; font-size:.68rem; }
.doc-scroll { overflow-y:auto; max-height:calc(100vh - 140px); }

/* ══ PÁGINA A4 ══ */
.doc-area { display:flex; flex-direction:column; align-items:center; padding:1.5rem 1rem 3rem; gap:1.5rem; }

.pagina {
  width:210mm; min-height:297mm; background:#fff; color:#1a1a1a;
  font-family:'Sora',sans-serif; font-size:10pt;
  box-shadow:0 4px 32px rgba(0,0,0,.5);
  position:relative; display:flex; flex-direction:column;
  page-break-after:always; break-after:page;
}

/* HEADER */
.pg-header {
  background:#1e40af; padding:20px 42px 16px;
  display:flex; align-items:center; justify-content:space-between;
}
.hd-left { display:flex; align-items:center; gap:11px; }
.hd-logo-box {
  width:56px; height:56px; border-radius:10px;
  background:#fff; border:none;
  display:flex; align-items:center; justify-content:center; overflow:hidden;
  box-shadow:0 2px 16px rgba(0,0,0,.35);
  flex-shrink:0; padding:4px;
}
.hd-logo-box img { width:100%; height:100%; object-fit:contain; border-radius:7px; }
.hd-company-name { font-size:13pt; font-weight:800; color:#fff; letter-spacing:-.2px; line-height:1.1; }
.hd-company-name em { color:rgba(255,255,255,.6); font-style:normal; font-weight:300; }
.hd-company-sub { font-size:6pt; letter-spacing:3.5px; text-transform:uppercase; color:rgba(255,255,255,.45); margin-top:2px; font-weight:600; }
.hd-right { text-align:right; }
.hd-num-lbl { font-size:5.5pt; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,.45); font-weight:600; margin-bottom:2px; }
.hd-num { font-size:14pt; font-weight:900; color:#fff; font-family:'DM Mono',monospace; letter-spacing:-.4px; }
.hd-date { font-size:7.5pt; color:rgba(255,255,255,.55); margin-top:2px; }

/* BANNER */
.pg-banner {
  background:linear-gradient(135deg,#1e3a8a,#1e40af);
  border-top:1px solid rgba(255,255,255,.08);
  padding:14px 42px 12px;
  display:flex; align-items:center; justify-content:space-between;
}
.banner-tipo { font-size:18pt; font-weight:900; color:#fff; letter-spacing:-.4px; }
.banner-sub { font-size:6.5pt; letter-spacing:3.5px; text-transform:uppercase; color:rgba(255,255,255,.5); margin-top:2px; font-weight:600; }
.banner-badge {
  background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
  border-radius:6px; padding:4px 10px; font-size:7pt; font-weight:700; color:#fff;
  letter-spacing:1.5px; text-transform:uppercase;
}

/* CORPO */
.pg-body { padding:26px 42px 0; flex:1; }

/* Seções TCE */
.tce-section { margin-bottom:16px; }
.tce-section-title {
  font-size:7pt; font-weight:800; letter-spacing:2px; text-transform:uppercase;
  color:#1e40af; border-bottom:1px solid #dbeafe; padding-bottom:4px; margin-bottom:8px;
}
.tce-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px 22px; }
.tce-grid.cols3 { grid-template-columns:1fr 1fr 1fr; }
.tce-lbl { font-size:5.5pt; color:#aaa; text-transform:uppercase; letter-spacing:.7px; font-weight:700; margin-bottom:2px; }
.tce-val { font-size:8.5pt; font-weight:600; color:#1a1a1a; border-bottom:1px solid #eee; padding-bottom:3px; }
.tce-full { grid-column:1/-1; }
.tce-atividades {
  background:#f8faff; border:1px solid #dbeafe; border-radius:6px;
  padding:8px 12px; font-size:8pt; line-height:1.7; color:#2a2a2a; margin-top:4px;
}

/* FOOTER */
.pg-footer {
  background:#1e40af; padding:10px 42px;
  display:flex; align-items:center; justify-content:space-between; margin-top:auto;
}
.ft-left { font-size:6.5pt; color:rgba(255,255,255,.75); line-height:1.85; }
.ft-left strong { color:#fff; font-weight:700; }
.ft-right { font-size:6.5pt; color:rgba(255,255,255,.6); font-weight:600; white-space:nowrap; }

/* Página de assinaturas */
.pg2 { width:210mm; min-height:297mm; background:#fff; color:#1a1a1a;
  font-family:'Sora',sans-serif; font-size:10pt;
  box-shadow:0 4px 32px rgba(0,0,0,.5); display:flex; flex-direction:column; }
.pg2-body { padding:32px 42px 0; flex:1; }

/* Bloco assinatura digital no documento */
.sig-bloco {
  border:1.5px solid #dbeafe; border-radius:10px;
  padding:14px 17px; margin-bottom:14px; background:#fff;
}
.sig-bloco.assinado { border-color:#86efac; background:#f0fdf4; }
.sig-bloco.recusado { border-color:#fca5a5; background:#fff5f5; }
.sig-bloco-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
}
.sig-bloco-nome { font-size:10pt; font-weight:800; color:#1e40af; }
.sig-bloco.assinado .sig-bloco-nome { color:#16a34a; }
.sig-bloco.recusado .sig-bloco-nome { color:#dc2626; }
.sig-bloco-papel { font-size:7pt; color:#777; margin-top:1px; }
.sig-bloco-status {
  font-size:6.5pt; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
  padding:3px 8px; border-radius:5px;
}
.sig-bloco-status.ok  { background:#dcfce7; color:#16a34a; }
.sig-bloco-status.pend{ background:#fef3c7; color:#92400e; }
.sig-bloco-status.rec { background:#fee2e2; color:#991b1b; }
.sig-canvas-area {
  background:#f1f5f9; border:1px dashed #94a3b8; border-radius:6px;
  height:64px; display:flex; align-items:center; justify-content:center;
  font-size:7.5pt; color:#94a3b8; margin-bottom:8px;
}
.sig-canvas-img { width:100%; height:64px; object-fit:contain; background:#f1f5f9; border-radius:6px; margin-bottom:8px; }
.sig-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px 14px; }
.sig-info-lbl { font-size:5.5pt; color:#aaa; text-transform:uppercase; letter-spacing:.7px; font-weight:700; }
.sig-info-val { font-size:7.5pt; font-weight:600; color:#1a1a1a; }
.sig-hash { font-family:'DM Mono',monospace; font-size:6.5pt; color:#1e40af; word-break:break-all; }

/* Caixa de autenticidade */
.auth-box {
  background:#eff6ff; border:1.5px solid #93c5fd;
  border-radius:8px; padding:11px 17px; font-size:7pt; line-height:2; margin-top:14px;
}
.auth-title { font-size:6.5pt; font-weight:800; color:#1e40af; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:4px; }
.auth-row { display:flex; gap:8px; }
.auth-lbl { color:#777; font-weight:600; min-width:180px; flex-shrink:0; }
.auth-val { color:#1a1a1a; font-family:'DM Mono',monospace; font-size:6.5pt; word-break:break-all; }
.auth-val.nm { font-family:'Sora',sans-serif; color:#1e40af; font-weight:700; }

/* Selos de validação */
.selos-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:12px 0; }
.selo {
  border-radius:7px; padding:8px 11px;
  font-size:7pt; line-height:1.7;
}
.selo.verde { background:#dcfce7; border:1px solid #86efac; color:#166534; }
.selo.azul  { background:#dbeafe; border:1px solid #93c5fd; color:#1e3a8a; }
.selo-titulo { font-weight:800; margin-bottom:1px; font-size:7.5pt; }

/* ── Estado de carregamento ── */
.loading-state {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:60vh; gap:1rem; color:var(--muted);
}
.loading-spinner {
  width:36px; height:36px; border:3px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Print ── */
@media print {
  body { background:#fff !important; }
  .toolbar { display:none !important; }
  .page-wrap { display:block !important; padding:0 !important; }
  .status-panel { display:none !important; }
  .doc-col { display:block !important; }
  .doc-wrapper { background:none !important; border:none !important; border-radius:0 !important; }
  .doc-header-bar { display:none !important; }
  .doc-scroll { max-height:none !important; overflow:visible !important; }
  .doc-area { padding:0 !important; gap:0 !important; }
  .pagina, .pg2 { box-shadow:none !important; margin-bottom:0 !important; page-break-after:always; }
  @page { margin:0; size:A4; }
}

@media (max-width:900px) {
  .page-wrap { grid-template-columns:1fr !important; }
  .doc-scroll { max-height:none; }
}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="tb-info">
    <div class="tb-logo">
      <img src="../capas/png123.png" alt="Orizon" style="width:100%;height:100%;object-fit:cover;border-radius:7px;" onerror="this.style.display='none'"/>
    </div>
    <div>
      <div class="tb-title">Orizon <em>Contratos Digitais</em></div>
      <div class="tb-num" id="tbNum">—</div>
    </div>
  </div>
  <div class="tb-actions">
    <a href="index-contratos.html" class="btn btn-ghost btn-sm">← Voltar</a>
    <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨️ Imprimir</button>
    <button class="btn btn-primary btn-sm" id="btnDownload" onclick="window.print()" style="display:none">📥 Salvar PDF</button>
  </div>
</div>

<!-- CONTEÚDO -->
<div class="page-wrap" id="pageWrap">

  <!-- Painel lateral -->
  <aside class="status-panel" id="statusPanel">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <span>Carregando contrato...</span>
    </div>
  </aside>

  <!-- Documento -->
  <div class="doc-col">
    <div class="doc-wrapper">
      <div class="doc-header-bar">
        <span>📄 Documento</span>
        <span id="docStatusLabel">—</span>
      </div>
      <div class="doc-scroll">
        <div class="doc-area" id="docArea">
          <div class="loading-state">
            <div class="loading-spinner"></div>
            <span>Carregando documento...</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="toast-ct"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/cr-auth.js"></script>
<script src="assets/cr-utils.js"></script>
<script>

const LOGO = '../capas/png123.png';
const ORIZON = {
  nome: 'Orizon Consultoria Recrutamento e Seleção LTDA',
  cnpj: '46.599.025/0001-54',
  end:  'Rua São José, nº 584, sala 202 — Centro, Guaíba/RS · CEP 92704-380',
  tel:  '(51) 99850-3183',
  email:'adm@orizon.com.br'
};

const PAPEL_LABEL = {
  candidato:       'Candidato / Colaborador',
  empresa_nexus:   'Orizon Consultoria',
  empresa_cliente: 'Empresa Contratante',
  instituicao:     'Instituição de Ensino',
  supervisor:      'Supervisor / Responsável',
};

let _sb, _contrato, _signatarios;

// ── Formatadores ──────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d.includes('T') ? d : d + 'T12:00:00');
  if (isNaN(dt)) return '—';
  return dt.toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
}
function fmtDateShort(d) {
  if (!d) return '—';
  const dt = new Date(d.includes('T') ? d : d + 'T12:00:00');
  if (isNaN(dt)) return '—';
  return dt.toLocaleDateString('pt-BR');
}
function fmtDT(d) {
  if (!d) return '—';
  const dt = new Date(d.includes(' ') ? d.replace(' ','T') : d);
  if (isNaN(dt)) return '—';
  return dt.toLocaleString('pt-BR');
}
function brl(v) {
  if (!v) return '—';
  return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits:2 });
}
function genHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h = h|0; }
  return Math.abs(h).toString(16).toUpperCase().padStart(16,'0');
}

// ── Init ──────────────────────────────────────────────────────
(async () => {
  await new Promise(r => { const t = setInterval(() => { if (window._sb) { clearInterval(t); r(); } }, 80); });
  _sb = window._sb;

  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) {
    mostrarErro('Nenhum contrato especificado. Volte e tente novamente.');
    return;
  }

  try {
    const [{ data: c, error: ce }, { data: s, error: se }] = await Promise.all([
      _sb.from('cr_contratos').select('*').eq('id', id).single(),
      _sb.from('cr_signatarios').select('*').eq('contrato_id', id).order('criado_em', { ascending: true })
    ]);
    if (ce) throw ce;
    if (se) throw se;
    _contrato = c;
    _signatarios = s || [];
    renderTudo();
  } catch(e) {
    console.error(e);
    mostrarErro('Erro ao carregar contrato. Verifique se o ID é válido.');
  }
})();

function mostrarErro(msg) {
  document.getElementById('statusPanel').innerHTML =
    `<div class="loading-state"><span style="font-size:2rem">⚠️</span><span>${msg}</span>
     <a href="index-contratos.html" class="btn btn-ghost btn-sm">← Voltar</a></div>`;
  document.getElementById('docArea').innerHTML =
    `<div class="loading-state"><span style="font-size:2rem">⚠️</span><span>${msg}</span></div>`;
}

// ── Render principal ──────────────────────────────────────────
function renderTudo() {
  const c = _contrato;
  const s = _signatarios;

  // Toolbar
  document.getElementById('tbNum').textContent = c.numero_contrato || '—';
  document.title = `${c.titulo || 'Contrato'} — Orizon`;

  // Label status
  const stLbl = { assinado:'✅ Totalmente Assinado', parcial:'⏳ Assinatura Parcial', enviado:'📨 Aguardando Assinaturas', cancelado:'❌ Cancelado' };
  document.getElementById('docStatusLabel').textContent = stLbl[c.status] || c.status;

  if (c.status === 'assinado') {
    document.getElementById('btnDownload').style.display = '';
  }

  renderPainelLateral(c, s);
  renderDocumento(c, s);
}

// ── PAINEL LATERAL ────────────────────────────────────────────
function renderPainelLateral(c, s) {
  const assinados = s.filter(x => x.status === 'assinado').length;
  const stClasses = { assinado:'assinado', parcial:'parcial', enviado:'enviado', cancelado:'cancelado' };
  const stIcons   = { assinado:'✅', parcial:'⏳', enviado:'📨', cancelado:'❌' };
  const stLbls    = { assinado:'Totalmente Assinado', parcial:'Assinatura Parcial', enviado:'Aguardando Assinaturas', cancelado:'Cancelado' };

  // Auditoria: constrói a partir dos signatários
  const auditoria = [];
  auditoria.push({ dot:'evt', msg: `Contrato criado por <strong>Orizon Consultoria</strong>`, ts: fmtDT(c.criado_em) });
  s.forEach(sig => {
    if (sig.visualizado_em) {
      auditoria.push({ dot:'evt', msg:`<strong>${sig.nome}</strong> visualizou o documento`, ts: fmtDT(sig.visualizado_em) });
    }
    if (sig.status === 'assinado' && sig.assinado_em) {
      auditoria.push({ dot:'ok', msg:`<strong>${sig.nome}</strong> assinou o documento`, ts: fmtDT(sig.assinado_em) });
    }
    if (sig.status === 'recusado' && sig.recusado_em) {
      auditoria.push({ dot:'err', msg:`<strong>${sig.nome}</strong> recusou a assinatura`, ts: fmtDT(sig.recusado_em) });
    }
  });
  if (c.status === 'assinado' && c.atualizado_em) {
    auditoria.push({ dot:'ok', msg:`Contrato <strong>totalmente assinado</strong> e finalizado`, ts: fmtDT(c.atualizado_em) });
  }
  // ordena por ts (melhor-esforço)
  auditoria.sort((a, b) => {
    const pa = new Date(a.ts.split('/').reverse().join('-').replace(', ',' ') || 0);
    const pb = new Date(b.ts.split('/').reverse().join('-').replace(', ',' ') || 0);
    return pa - pb;
  });

  document.getElementById('statusPanel').innerHTML = `

    <!-- Card: Status geral -->
    <div class="status-card">
      <div class="sc-head">
        <span style="font-size:.88rem">🖊️</span>
        <span class="sc-head-title">Status do Contrato</span>
      </div>
      <div class="sc-body">
        <div class="contrato-status-badge ${stClasses[c.status] || 'enviado'}">
          <span>${stIcons[c.status] || '📨'}</span>
          <span>${stLbls[c.status] || c.status}</span>
        </div>
        <div class="meta-row"><span class="meta-lbl">Número</span><span class="meta-val mono">${c.numero_contrato || '—'}</span></div>
        <div class="meta-row"><span class="meta-lbl">Tipo</span><span class="meta-val">${c.tipo === 'clt' ? '💼 CLT' : '🎓 Estágio'}</span></div>
        <div class="meta-row"><span class="meta-lbl">Candidato</span><span class="meta-val">${c.nome_candidato || '—'}</span></div>
        <div class="meta-row"><span class="meta-lbl">Cargo</span><span class="meta-val">${c.cargo || '—'}</span></div>
        <div class="meta-row"><span class="meta-lbl">Empresa</span><span class="meta-val">${c.empresa || '—'}</span></div>
        <div class="meta-row"><span class="meta-lbl">Criado em</span><span class="meta-val">${fmtDateShort(c.criado_em)}</span></div>
        <div class="meta-row"><span class="meta-lbl">Assinaturas</span><span class="meta-val" style="color:var(--green)">${assinados} / ${s.length}</span></div>
      </div>
    </div>

    <!-- Card: Signatários -->
    <div class="status-card">
      <div class="sc-head">
        <span style="font-size:.88rem">👥</span>
        <span class="sc-head-title">Signatários</span>
      </div>
      <div class="sc-body">
        ${s.length === 0 ? '<div style="color:var(--muted);font-size:.72rem">Nenhum signatário cadastrado.</div>' :
          s.map(sig => {
            const cls = sig.status === 'assinado' ? 'ok' : sig.status === 'recusado' ? 'rec' : 'pend';
            const ico = sig.status === 'assinado' ? '✓' : sig.status === 'recusado' ? '✕' : '…';
            return `<div class="sig-item">
              <div class="sig-dot-lg ${cls}">${ico}</div>
              <div style="flex:1;min-width:0">
                <div class="sig-nome">${sig.nome}</div>
                <div class="sig-papel">${PAPEL_LABEL[sig.papel] || sig.papel || '—'}</div>
                ${sig.status === 'assinado' && sig.assinado_em
                  ? `<div class="sig-data">✅ ${fmtDT(sig.assinado_em)}</div>`
                  : sig.status === 'recusado'
                    ? `<div class="sig-data" style="color:var(--red)">❌ Recusou</div>`
                    : `<div class="sig-data" style="color:var(--orange)">⏳ Pendente</div>`}
              </div>
            </div>`;
          }).join('')}
      </div>
    </div>

    <!-- Card: Trilha de auditoria -->
    <div class="status-card">
      <div class="sc-head">
        <span style="font-size:.88rem">📋</span>
        <span class="sc-head-title">Trilha de Auditoria</span>
      </div>
      <div class="sc-body">
        ${auditoria.length === 0
          ? '<div style="color:var(--muted);font-size:.72rem">Nenhum evento registrado.</div>'
          : auditoria.map(ev => `
            <div class="audit-item">
              <div class="audit-dot ${ev.dot}"></div>
              <div class="audit-msg">${ev.msg}</div>
              <div class="audit-ts">${ev.ts}</div>
            </div>`).join('')}
      </div>
    </div>
  `;
}

// ── DOCUMENTO ────────────────────────────────────────────────
function renderDocumento(c, s) {
  const dataEmissao = fmtDate(c.criado_em);
  const hash = genHash((c.nome_candidato||'') + (c.numero_contrato||'') + (c.criado_em||''));
  const assinadoTotal = c.status === 'assinado';

  function mkHeader() {
    return `
    <div class="pg-header">
      <div class="hd-left">
        <div class="hd-logo-box"><img src="${LOGO}" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'"/></div>
        <div>
          <div class="hd-company-name">Orizon <em>Consultoria</em></div>
          <div class="hd-company-sub">Recrutamento · Seleção · Estágios</div>
        </div>
      </div>
      <div class="hd-right">
        <div class="hd-num-lbl">Nº do Contrato</div>
        <div class="hd-num">${c.numero_contrato || '—'}</div>
        <div class="hd-date">${dataEmissao}</div>
      </div>
    </div>`;
  }

  function mkFooter(pg, tot) {
    return `
    <div class="pg-footer">
      <div class="ft-left">
        <strong>${ORIZON.nome}</strong> · CNPJ ${ORIZON.cnpj}<br/>
        ${ORIZON.end} · ${ORIZON.email} · ${ORIZON.tel}
      </div>
      <div class="ft-right">Página ${pg} de ${tot}</div>
    </div>`;
  }

  // ── Página 1: Dados do contrato ──────────────────────────
  let pg1 = `
  <div class="pagina">
    ${mkHeader()}
    <div class="pg-banner">
      <div>
        <div class="banner-tipo">${c.tipo === 'clt' ? 'Contrato CLT' : 'Termo de Compromisso de Estágio'}</div>
        <div class="banner-sub">${c.tipo === 'clt' ? 'Consolidação das Leis do Trabalho' : 'TCE — Lei nº 11.788/2008'}</div>
      </div>
      <div class="banner-badge">${assinadoTotal ? '✅ ASSINADO' : '⏳ PENDENTE'}</div>
    </div>
    <div class="pg-body">
      <div class="tce-section">
        <div class="tce-section-title">I — Identificação do Contrato</div>
        <div class="tce-grid">
          <div><div class="tce-lbl">Número</div><div class="tce-val" style="font-family:'DM Mono',monospace;color:#1e40af">${c.numero_contrato || '—'}</div></div>
          <div><div class="tce-lbl">Tipo</div><div class="tce-val">${c.tipo === 'clt' ? '💼 CLT' : '🎓 Estágio'}</div></div>
          <div><div class="tce-lbl">Data de Emissão</div><div class="tce-val">${dataEmissao}</div></div>
          <div><div class="tce-lbl">Título</div><div class="tce-val">${c.titulo || '—'}</div></div>
        </div>
      </div>

      <div class="tce-section">
        <div class="tce-section-title">II — Candidato / Colaborador</div>
        <div class="tce-grid cols3">
          <div class="tce-full"><div class="tce-lbl">Nome Completo</div><div class="tce-val">${c.nome_candidato || '—'}</div></div>
          <div><div class="tce-lbl">CPF</div><div class="tce-val">${c.cpf || '—'}</div></div>
          <div><div class="tce-lbl">Cargo / Função</div><div class="tce-val">${c.cargo || '—'}</div></div>
          <div><div class="tce-lbl">E-mail</div><div class="tce-val">${c.email_candidato || '—'}</div></div>
          ${c.curso ? `<div><div class="tce-lbl">Curso</div><div class="tce-val">${c.curso}</div></div>` : ''}
          ${c.instituicao ? `<div><div class="tce-lbl">Instituição de Ensino</div><div class="tce-val">${c.instituicao}</div></div>` : ''}
          ${c.matricula ? `<div><div class="tce-lbl">Matrícula</div><div class="tce-val">${c.matricula}</div></div>` : ''}
          ${c.semestre ? `<div><div class="tce-lbl">Semestre</div><div class="tce-val">${c.semestre}</div></div>` : ''}
        </div>
      </div>

      <div class="tce-section">
        <div class="tce-section-title">III — Empresa Contratante</div>
        <div class="tce-grid">
          <div><div class="tce-lbl">Razão Social</div><div class="tce-val">${c.empresa || '—'}</div></div>
          <div><div class="tce-lbl">CNPJ</div><div class="tce-val">${c.cnpj_empresa || '—'}</div></div>
          ${c.endereco_emp ? `<div class="tce-full"><div class="tce-lbl">Endereço</div><div class="tce-val">${c.endereco_emp}</div></div>` : ''}
        </div>
      </div>

      <div class="tce-section">
        <div class="tce-section-title">IV — Condições</div>
        <div class="tce-grid cols3">
          <div><div class="tce-lbl">Início</div><div class="tce-val">${fmtDateShort(c.periodo_inicio)}</div></div>
          <div><div class="tce-lbl">Término</div><div class="tce-val">${fmtDateShort(c.periodo_fim)}</div></div>
          <div><div class="tce-lbl">Jornada</div><div class="tce-val">${c.jornada_horas || '—'}</div></div>
          ${c.valor_bolsa ? `<div><div class="tce-lbl">Bolsa / Salário</div><div class="tce-val">${brl(c.valor_bolsa)}</div></div>` : ''}
          ${c.valor_vt ? `<div><div class="tce-lbl">Vale-Transporte</div><div class="tce-val">${brl(c.valor_vt)}/dia</div></div>` : ''}
          ${c.apolice_seguro ? `<div><div class="tce-lbl">Apólice de Seguro</div><div class="tce-val">${c.apolice_seguro}</div></div>` : ''}
        </div>
      </div>

      ${c.atividades_plano ? `
      <div class="tce-section">
        <div class="tce-section-title">V — Plano de Atividades</div>
        <div class="tce-atividades">${c.atividades_plano.replace(/\n/g,'<br/>')}</div>
      </div>` : ''}

      ${c.supervisor_nome ? `
      <div class="tce-section">
        <div class="tce-section-title">VI — Supervisor</div>
        <div class="tce-grid">
          <div><div class="tce-lbl">Nome</div><div class="tce-val">${c.supervisor_nome}</div></div>
          <div><div class="tce-lbl">Cargo</div><div class="tce-val">${c.supervisor_cargo || '—'}</div></div>
        </div>
      </div>` : ''}
    </div>
    ${mkFooter(1, 3)}
  </div>`;

  // ── Página 2: Cláusulas ───────────────────────────────────
  let pg2 = `
  <div class="pg2">
    ${mkHeader()}
    <div class="pg2-body">
      <div class="tce-section">
        <div class="tce-section-title">VII — Agência de Integração</div>
        <div class="tce-grid">
          <div><div class="tce-lbl">Razão Social</div><div class="tce-val">${ORIZON.nome}</div></div>
          <div><div class="tce-lbl">CNPJ</div><div class="tce-val">${ORIZON.cnpj}</div></div>
          <div class="tce-full"><div class="tce-lbl">Endereço</div><div class="tce-val">${ORIZON.end}</div></div>
        </div>
      </div>
      <div style="margin-top:14px;font-size:7.5pt;line-height:1.85;color:#444">
        <p style="margin-bottom:7px"><strong>Cláusula 1ª — Objeto:</strong> O presente Termo de Compromisso de Estágio rege-se pela Lei nº 11.788, de 25 de setembro de 2008 e demais normas correlatas.</p>
        <p style="margin-bottom:7px"><strong>Cláusula 2ª — Obrigações da Parte Concedente:</strong> Proporcionar condições de aprendizagem relacionadas à habilitação profissional, bem como supervisionar o estagiário por servidor habilitado, na área relacionada ao curso.</p>
        <p style="margin-bottom:7px"><strong>Cláusula 3ª — Obrigações do Estagiário:</strong> Cumprir as normas internas da parte concedente, zelar pelos materiais e equipamentos disponibilizados, manter frequência regular e apresentar relatório de atividades quando exigido.</p>
        <p style="margin-bottom:7px"><strong>Cláusula 4ª — Rescisão:</strong> O presente instrumento poderá ser rescindido por qualquer das partes mediante comunicação prévia de 30 (trinta) dias, sem ônus.</p>
        <p style="margin-bottom:7px"><strong>Cláusula 5ª — Seguro:</strong> O estagiário está coberto por apólice de seguro contra acidentes pessoais nº ${c.apolice_seguro || '—'} durante o período de vigência.</p>
        <p style="margin-bottom:7px"><strong>Cláusula 6ª — Validade Digital:</strong> As assinaturas eletrônicas apostas neste documento possuem validade jurídica nos termos da Lei nº 14.063/2020 e da MP nº 2.200-2/2001, sendo identificadas por hash SHA-256 e registradas com data, hora e IP do signatário.</p>
      </div>
      <div class="selos-grid">
        <div class="selo verde">
          <div class="selo-titulo">✅ Assinatura Digital Válida</div>
          Lei nº 14.063/2020 · MP nº 2.200-2/2001<br/>
          Hash registrado com timestamp
        </div>
        <div class="selo azul">
          <div class="selo-titulo">🔒 Trilha de Auditoria</div>
          Todas as ações registradas com IP,<br/>
          data e hora do signatário
        </div>
      </div>
    </div>
    ${mkFooter(2, 3)}
  </div>`;

  // ── Página 3: Assinaturas ─────────────────────────────────
  const sigsHtml = s.map(sig => {
    const cls = sig.status === 'assinado' ? 'assinado' : sig.status === 'recusado' ? 'recusado' : '';
    const stCls = sig.status === 'assinado' ? 'ok' : sig.status === 'recusado' ? 'rec' : 'pend';
    const stLbl = sig.status === 'assinado' ? 'ASSINADO' : sig.status === 'recusado' ? 'RECUSADO' : 'PENDENTE';
    const sigHash = sig.status === 'assinado'
      ? genHash((sig.nome||'') + (sig.assinado_em||'') + (sig.ip||''))
      : null;
    return `
    <div class="sig-bloco ${cls}">
      <div class="sig-bloco-header">
        <div>
          <div class="sig-bloco-nome">${sig.nome}</div>
          <div class="sig-bloco-papel">${PAPEL_LABEL[sig.papel] || sig.papel || '—'}</div>
        </div>
        <div class="sig-bloco-status ${stCls}">${stLbl}</div>
      </div>
      ${sig.assinatura_img
        ? `<img src="${sig.assinatura_img}" class="sig-canvas-img" alt="Assinatura de ${sig.nome}"/>`
        : `<div class="sig-canvas-area">${sig.status === 'assinado' ? '✅ Assinatura registrada digitalmente' : '— Aguardando assinatura —'}</div>`}
      <div class="sig-info-grid">
        <div><div class="sig-info-lbl">E-mail</div><div class="sig-info-val">${sig.email || '—'}</div></div>
        ${sig.status === 'assinado' && sig.assinado_em
          ? `<div><div class="sig-info-lbl">Assinado em</div><div class="sig-info-val">${fmtDT(sig.assinado_em)}</div></div>` : ''}
        ${sig.ip ? `<div><div class="sig-info-lbl">IP</div><div class="sig-info-val">${sig.ip}</div></div>` : ''}
        ${sigHash ? `<div class="tce-full"><div class="sig-info-lbl">Hash SHA-256</div><div class="sig-info-val sig-hash">${sigHash}</div></div>` : ''}
      </div>
    </div>`;
  }).join('');

  const finalHash = genHash(hash + s.map(x => x.assinado_em || '').join(''));

  let pg3 = `
  <div class="pg2">
    ${mkHeader()}
    <div class="pg2-body">
      <div class="tce-section-title" style="font-size:7pt;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#1e40af;border-bottom:1px solid #dbeafe;padding-bottom:4px;margin-bottom:14px">VIII — Assinaturas Digitais</div>
      <p style="font-size:8pt;color:#555;line-height:1.75;margin-bottom:14px">
        E, por estarem assim justos e contratados, as partes assinam o presente instrumento eletronicamente, tendo cada assinatura força jurídica equivalente à assinatura manuscrita, nos termos da legislação vigente.
      </p>
      ${sigsHtml || '<div style="color:#aaa;font-size:8pt">Nenhum signatário cadastrado.</div>'}
      <div class="auth-box">
        <div class="auth-title">🔒 Certificado de Autenticidade do Documento</div>
        <div class="auth-row"><span class="auth-lbl">Número do Contrato:</span><span class="auth-val nm">${c.numero_contrato || '—'}</span></div>
        <div class="auth-row"><span class="auth-lbl">Título:</span><span class="auth-val nm">${c.titulo || '—'}</span></div>
        <div class="auth-row"><span class="auth-lbl">Hash do Documento:</span><span class="auth-val">${hash}</span></div>
        <div class="auth-row"><span class="auth-lbl">Hash Final (c/ assinaturas):</span><span class="auth-val">${finalHash}</span></div>
        <div class="auth-row"><span class="auth-lbl">Status:</span><span class="auth-val nm">${c.status === 'assinado' ? 'TOTALMENTE ASSINADO' : c.status?.toUpperCase() || '—'}</span></div>
        <div class="auth-row"><span class="auth-lbl">Total de Signatários:</span><span class="auth-val nm">${s.filter(x => x.status === 'assinado').length} de ${s.length} assinaram</span></div>
        <div class="auth-row"><span class="auth-lbl">Emitido por:</span><span class="auth-val nm">Orizon Consultoria · CNPJ ${ORIZON.cnpj}</span></div>
        <div class="auth-row"><span class="auth-lbl">Emissão do documento:</span><span class="auth-val nm">${dataEmissao}</span></div>
      </div>
    </div>
    ${mkFooter(3, 3)}
  </div>`;

  document.getElementById('docArea').innerHTML = pg1 + pg2 + pg3;
}
</script>
</body>
</html>
